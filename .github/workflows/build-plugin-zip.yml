# Release-like zip: push an annotated or lightweight tag matching v* (e.g. v0.1.0, v0.2.0-rc1).
# workflow_dispatch is for ad-hoc builds; optional ref input should match the commit you want packaged.
# Tag pushes also publish a GitHub Release (same zip attached). Manual runs only publish when requested.
name: Build plugin zip

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build (branch, tag, or SHA; leave empty for default branch)"
        required: false
        default: ""
        type: string
      publish_github_release:
        description: "Create/update GitHub Release with the zip (set ref to the tag, e.g. v0.2.1)"
        required: false
        default: false
        type: boolean
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref != '' && github.event.inputs.ref || github.ref }}

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm run build

      - name: Install Decky CLI
        run: |
          mkdir -p cli
          curl -fsSL -o cli/decky "https://github.com/SteamDeckHomebrew/cli/releases/latest/download/decky-linux-x86_64"
          chmod +x cli/decky

      - name: Build plugin zip
        run: sudo ./cli/decky plugin build "$GITHUB_WORKSPACE"

      - name: Verify zip contents
        run: |
          shopt -s nullglob
          zips=(out/*.zip)
          if [[ ${#zips[@]} -eq 0 ]]; then
            echo "No zip produced under out/"
            ls -la out || true
            exit 1
          fi
          for z in "${zips[@]}"; do
            bash ./scripts/verify-decky-plugin-zip.sh "$z"
          done

      - name: Artifact label (tag, dispatch ref, or branch)
        id: artifact_label
        shell: bash
        run: |
          LABEL="${GITHUB_REF_NAME}"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ github.event.inputs.ref }}" ]]; then
            LABEL="${{ github.event.inputs.ref }}"
          fi
          LABEL="${LABEL#refs/tags/}"
          LABEL="${LABEL//\//-}"
          SHORT_SHA="${GITHUB_SHA:0:7}"
          echo "slug=${LABEL}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bonsai-plugin-${{ steps.artifact_label.outputs.slug }}
          path: out/*.zip
          if-no-files-found: error

      - name: Resolve GitHub Release tag
        id: gh_release_tag
        if: >-
          (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
          (github.event_name == 'workflow_dispatch' && inputs.publish_github_release == true &&
          (startsWith(inputs.ref, 'v') || startsWith(inputs.ref, 'refs/tags/v')))
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            T="${{ inputs.ref }}"
          else
            T="${GITHUB_REF#refs/tags/}"
          fi
          T="${T#refs/tags/}"
          echo "tag_name=${T}" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        if: steps.gh_release_tag.outcome == 'success'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.gh_release_tag.outputs.tag_name }}
          files: out/*.zip
          generate_release_notes: true
